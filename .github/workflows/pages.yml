# Publishes the docs/ folder as a GitHub Pages site (the themed research
# report) and builds a transportable PDF from FINDINGS.md into docs/report.pdf.
#
# Pages is auto-enabled by the `actions/configure-pages` step below
# (enablement: true), so there is NO manual "Settings -> Pages" toggle to do —
# the only requirement is that the repo is PUBLIC (free GitHub Pages). The first
# push that runs this workflow turns Pages on and deploys.

name: pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Silence the Node-20 deprecation warning: opt every bundled JS action into the
# Node 24 runtime now (GitHub forces this after 2026-06-16 anyway). Version-agnostic,
# so it does not depend on chasing new action release tags. If a future action ever
# breaks under Node 24, drop this and pin newer action versions instead.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages (auto-enables Pages if not already on)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Install pandoc + weasyprint (PDF engine, isolated venv)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libffi-dev fonts-dejavu
          python3 -m venv /tmp/wp
          /tmp/wp/bin/pip install --upgrade pip weasyprint
      - name: Build report PDF into docs/
        run: |
          mkdir -p docs
          if [ -f FINDINGS.md ]; then
            pandoc FINDINGS.md -f gfm --standalone \
              --metadata title="Reservoir Attention Network (RAN) — Findings" \
              --include-in-header report-print.html \
              -o docs/report.pdf --pdf-engine=/tmp/wp/bin/weasyprint \
              || { echo "::error::report.pdf build failed"; exit 1; }
            echo "Built docs/report.pdf ($(du -h docs/report.pdf | cut -f1))"
          else
            echo "No FINDINGS.md yet; skipping PDF build"
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
