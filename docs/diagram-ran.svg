<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ran-flow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b7a86"/></marker>
    <marker id="ran-in" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2f6f8f"/></marker>
    <marker id="ran-out" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/></marker>
    <marker id="ran-rec" markerWidth="8" markerHeight="8" refX="6" refY="2.6" orient="auto"><path d="M0,0 L6,2.6 L0,5.2 Z" fill="#2f6f8f"/></marker>
    <marker id="ran-carry" markerWidth="11" markerHeight="11" refX="7" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#7d5ba6"/></marker>
  </defs>

  <text x="430" y="28" text-anchor="middle" font-size="17" fill="#2b2b2b">The Reservoir Attention Network: a fixed reservoir injects carried state into mid-layer attention</text>

  <!-- ===== the transformer column (left/center) ===== -->
  <!-- input tokens -->
  <g fill="#caa15a" stroke="#9e7a2e" stroke-width="1.3">
    <circle cx="120" cy="380" r="13"/><circle cx="200" cy="380" r="13"/><circle cx="280" cy="380" r="13"/><circle cx="360" cy="380" r="13"/>
  </g>
  <text x="240" y="412" text-anchor="middle" font-size="12.5" fill="#555">token embeddings (context may be wiped between passes)</text>

  <!-- lower layers -> mid-layer Lk -->
  <g stroke="#6b7a86" stroke-width="2" fill="none" marker-end="url(#ran-flow)">
    <path d="M120,367 L120,318"/><path d="M200,367 L200,318"/><path d="M280,367 L280,318"/><path d="M360,367 L360,318"/>
  </g>
  <rect x="80" y="262" width="320" height="56" rx="9" fill="#f6efdc" stroke="#2b2b2b" stroke-width="1.6"/>
  <text x="240" y="284" text-anchor="middle" font-size="13" fill="#2b2b2b">lower transformer layers</text>
  <g fill="#2f6f8f" stroke="#1f4f63" stroke-width="1.2"><circle cx="120" cy="300" r="11"/><circle cx="200" cy="300" r="11"/><circle cx="280" cy="300" r="11"/><circle cx="360" cy="300" r="11"/></g>

  <!-- injection layer Lk: attention now also attends to reservoir prefix nodes -->
  <g stroke="#6b7a86" stroke-width="2" fill="none" marker-end="url(#ran-flow)">
    <path d="M120,262 L120,210"/><path d="M200,262 L200,210"/><path d="M280,262 L280,210"/><path d="M360,262 L360,210"/>
  </g>
  <rect x="80" y="150" width="430" height="60" rx="9" fill="#eef3ee" stroke="#2b2b2b" stroke-width="1.8"/>
  <text x="295" y="170" text-anchor="middle" font-size="12.5" fill="#2b2b2b">injection layer (mid-depth): attention over tokens + reservoir prefix</text>
  <g fill="#2f6f8f" stroke="#1f4f63" stroke-width="1.2"><circle cx="120" cy="190" r="11"/><circle cx="200" cy="190" r="11"/><circle cx="280" cy="190" r="11"/><circle cx="360" cy="190" r="11"/></g>
  <!-- the injected prefix pseudo-tokens (attended to alongside real tokens) -->
  <g fill="#7d5ba6" stroke="#52407a" stroke-width="1.2"><circle cx="430" cy="190" r="11"/><circle cx="470" cy="190" r="11"/></g>
  <!-- attention edges from prefix nodes into the token nodes -->
  <g stroke="#7d5ba6" stroke-width="1.1" fill="none" opacity="0.8" marker-end="url(#ran-rec)">
    <path d="M420,186 C360,176 300,176 291,186"/>
    <path d="M460,196 C380,206 240,206 211,194"/>
  </g>

  <!-- up to output -->
  <g stroke="#6b7a86" stroke-width="2" fill="none" marker-end="url(#ran-flow)"><path d="M240,150 L240,118"/></g>
  <rect x="150" y="80" width="180" height="38" rx="8" fill="#efe7d6" stroke="#b9ac90" stroke-width="1.4"/>
  <text x="240" y="104" text-anchor="middle" font-size="12.5" fill="#2b2b2b">upper layers, then output</text>

  <!-- ===== the reservoir (right) ===== -->
  <circle cx="650" cy="250" r="105" fill="#f6efdc" stroke="#2b2b2b" stroke-width="2.2"/>
  <text x="650" y="372" text-anchor="middle" font-size="13" fill="#2b2b2b">fixed random reservoir: state r(t)</text>
  <g stroke="#2f6f8f" stroke-width="1.6" fill="none" marker-end="url(#ran-rec)">
    <path d="M600,210 C635,196 680,198 712,214"/>
    <path d="M712,228 C735,255 720,290 686,305"/>
    <path d="M660,308 C620,316 596,292 596,262"/>
    <path d="M610,238 C645,255 680,250 700,236"/>
  </g>
  <g fill="#2f6f8f" stroke="#1f4f63" stroke-width="1.3">
    <circle cx="600" cy="210" r="15"/><circle cx="700" cy="216" r="15"/><circle cx="610" cy="278" r="15"/><circle cx="690" cy="292" r="15"/><circle cx="650" cy="248" r="15"/>
  </g>

  <!-- W_in: layer activations -> reservoir (read) -->
  <g stroke="#2f6f8f" stroke-width="2.4" fill="none" marker-end="url(#ran-in)">
    <path d="M400,290 C480,300 520,270 545,258"/>
  </g>
  <text x="470" y="312" text-anchor="middle" font-size="12.5" fill="#2f6f8f" font-style="italic">read (W_in, fixed)</text>

  <!-- W_out: reservoir -> prefix pseudo-tokens (write, trained) -->
  <g stroke="#c0392b" stroke-width="2.6" fill="none" marker-end="url(#ran-out)">
    <path d="M560,205 C520,180 500,185 482,189"/>
  </g>
  <text x="540" y="140" text-anchor="middle" font-size="12.5" fill="#c0392b" font-style="italic">write as prefix (W_out, trained)</text>

  <!-- carried state across passes -->
  <g stroke="#7d5ba6" stroke-width="3" fill="none" marker-end="url(#ran-carry)" stroke-dasharray="2 0">
    <path d="M735,300 C800,340 800,400 700,408 C540,418 360,415 250,418"/>
  </g>
  <text x="560" y="436" text-anchor="middle" font-size="13" fill="#7d5ba6" font-style="italic">state carried to the next forward pass, r(t) to r(t+1): survives the context wipe (the time axis)</text>
</svg>
