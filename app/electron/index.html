<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Reservoir Agent — live</title>
  <style>
    :root {
      --bg: #14110e; --panel: #1e1a16; --ink: #f2ece1; --muted: #9b9488;
      --agent: #d8b46a; --you: #7fa6c9; --line: #2c2620; --ok: #6fae5a; --warn: #c0613a;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--ink); height: 100vh; display: flex;
      flex-direction: column;
      font: 14px/1.55 ui-monospace, "Cascadia Code", "Consolas", monospace;
    }
    header {
      padding: 10px 16px; border-bottom: 1px solid var(--line);
      display: flex; align-items: baseline; gap: 12px;
    }
    header h1 { font-size: 14px; margin: 0; letter-spacing: .3px; }
    header .sub { color: var(--muted); font-size: 12px; }
    main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
    .pane { display: flex; flex-direction: column; min-height: 0; }
    .pane + .pane { border-left: 1px solid var(--line); }
    .pane h2 {
      margin: 0; padding: 8px 16px; font-size: 11px; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--muted); border-bottom: 1px solid var(--line);
    }
    .pane h2.agent { color: var(--agent); }
    .pane h2.you { color: var(--you); }
    .scroll { flex: 1; overflow-y: auto; padding: 14px 16px; white-space: pre-wrap; }
    #agentStream { color: var(--ink); }
    #agentStream .cursor { color: var(--agent); animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .msg { margin: 0 0 10px; padding: 8px 10px; border-radius: 6px; background: #221d18; }
    .msg.you { border-left: 2px solid var(--you); }
    .inputbar { border-top: 1px solid var(--line); padding: 10px; display: flex; gap: 8px; }
    #userInput {
      flex: 1; resize: none; height: 46px; background: #110e0b; color: var(--ink);
      border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px;
      font: inherit;
    }
    #userInput:focus { outline: none; border-color: var(--you); }
    footer {
      border-top: 1px solid var(--line); padding: 8px 16px; display: flex;
      align-items: center; gap: 18px; font-size: 12px; color: var(--muted);
      flex-wrap: wrap;
    }
    .stat b { color: var(--ink); font-weight: 600; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
           background: var(--warn); margin-right: 6px; vertical-align: middle; }
    .dot.live { background: var(--ok); }
    .scale { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    input[type=range] { accent-color: var(--agent); }
  </style>
</head>
<body>
  <header>
    <h1>Reservoir Agent</h1>
    <span class="sub" id="statusText">connecting…</span>
  </header>
  <main>
    <section class="pane">
      <h2 class="agent">agent — live stream</h2>
      <div class="scroll"><div id="agentStream"></div><span class="cursor" id="cursor">▌</span></div>
    </section>
    <section class="pane">
      <h2 class="you">you</h2>
      <div class="scroll" id="youHistory"></div>
      <div class="inputbar">
        <textarea id="userInput" placeholder="type and press Enter — it injects into the live stream (Shift+Enter for newline)"></textarea>
      </div>
    </section>
  </main>
  <footer>
    <span class="stat"><span class="dot" id="liveDot"></span><b id="connText">offline</b></span>
    <span class="stat">tick <b id="tick">0</b></span>
    <span class="stat">pass <b id="kind">—</b></span>
    <span class="stat">gate <b id="gate">—</b></span>
    <span class="stat">entropy <b id="entropy">—</b></span>
    <span class="stat">state·cos <b id="cos">—</b></span>
    <span class="scale">
      reservoir gain <b id="scaleVal">0.20</b>
      <input type="range" id="scale" min="0" max="1.5" step="0.05" value="0.2" />
    </span>
  </footer>
  <script src="renderer.js"></script>
</body>
</html>
