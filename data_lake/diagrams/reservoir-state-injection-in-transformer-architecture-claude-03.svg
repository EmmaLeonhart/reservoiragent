<path d="M168 345 Q250 295 380 322" stroke="#BA7517" stroke-width="0.8" opacity="0.3" fill="none" mask="url(#imagine-text-gaps-ld2kry)"></path>
<path d="M222 342 Q350 400 448 368" stroke="#BA7517" stroke-width="0.8" opacity="0.3" fill="none" mask="url(#imagine-text-gaps-ld2kry)"></path>

<!-- ── Attention bridge arrows (reservoir ↔ transformer hidden states) ── -->
<!-- upward arrows: reservoir attends to transformer representations -->
<path d="M148,338 Q130,270 200,228" stroke="#BA7517" stroke-width="1" opacity="0.6" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow-amber)"></path>
<path d="M470,343 Q490,270 440,228" stroke="#BA7517" stroke-width="1" opacity="0.6" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow-amber)" mask="url(#imagine-text-gaps-ld2kry)"></path>

<!-- ── Attention layer bridging transformer + reservoir ── -->
<line x1="320" y1="420" x2="320" y2="452" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)"></line>

<g class="node c-teal" onclick="sendPrompt(&#39;How does the joint attention layer work over both token and reservoir states?&#39;)">
  <rect x="60" y="452" width="520" height="70" rx="10" stroke-width="0.5"></rect>
  <text class="th" x="320" y="478" text-anchor="middle" dominant-baseline="central">Joint attention layer</text>
  <text class="ts" x="320" y="498" text-anchor="middle" dominant-baseline="central">Tokens + reservoir nodes as unified key/value sequence</text>
</g>

<line x1="320" y1="522" x2="320" y2="552" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)"></line>

<!-- ── Upper transformer block (fine-tuned) ── -->
<g class="node c-purple" onclick="sendPrompt(&#39;What is fine-tuned in the upper layers?&#39;)">
  <rect x="60" y="552" width="520" height="90" rx="10" stroke-width="0.5"></rect>
  <text class="th" x="320" y="575" text-anchor="middle" dominant-baseline="central">Hermes — upper layers (fine-tuned)</text>
  <text class="ts" x="320" y="595" text-anchor="middle" dominant-baseline="central">Reads temporal state from reservoir via attention</text>
  <rect x="90" y="608" width="120" height="22" rx="4" stroke-width="0" style="fill:#AFA9EC;opacity:0.5"></rect>
  <text class="ts" x="150" y="619" text-anchor="middle" dominant-baseline="central">Attention</text>
  <rect x="230" y="608" width="120" height="22" rx="4" stroke-width="0" style="fill:#AFA9EC;opacity:0.5"></rect>
  <text class="ts" x="290" y="619" text-anchor="middle" dominant-baseline="central">FFN</text>
  <rect x="370" y="608" width="120" height="22" rx="4" stroke-width="0" style="fill:#AFA9EC;opacity:0.5"></rect>
  <text class="ts" x="430" y="619" text-anchor="middle" dominant-baseline="central">Readout head</text>
</g>

<line x1="320" y1="642" x2="320" y2="672" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)"></line>

<!-- ── Output ── -->
<g class="node c-teal" onclick="sendPrompt(&#39;What outputs can a reservoir-augmented agent produce?&#39;)">
  <rect x="120" y="672" width="400" height="44" rx="8" stroke-width="0.5"></rect>
  <text class="th" x="320" y="693" text-anchor="middle" dominant-baseline="central">Next action / token output</text>
  <text class="ts" x="320" y="707" text-anchor="middle" dominant-baseline="central">Tool calls, reasoning, self-interrupts</text>
</g>

<!-- ── Recurrent feedback arrow (reservoir state persists across steps) ── -->
<path d="M580,452 Q630,460 630,380 Q630,290 580,270" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arrow-teal)" mask="url(#imagine-text-gaps-ld2kry)"></path>
