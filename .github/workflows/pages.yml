# Publishes the docs/ folder as a GitHub Pages site (the themed research
# report) and builds a transportable PDF from FINDINGS.md into docs/report.pdf.
#
# Pages is auto-enabled by the `actions/configure-pages` step below
# (enablement: true), so there is NO manual "Settings -> Pages" toggle to do —
# the only requirement is that the repo is PUBLIC (free GitHub Pages). The first
# push that runs this workflow turns Pages on and deploys.

name: pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Silence the Node-20 deprecation warning: opt every bundled JS action into the
# Node 24 runtime now (GitHub forces this after 2026-06-16 anyway). Version-agnostic,
# so it does not depend on chasing new action release tags. If a future action ever
# breaks under Node 24, drop this and pin newer action versions instead.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages (auto-enables Pages if not already on)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Install TeX Live + pandoc (NeurIPS LaTeX PDF engine)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-luatex texlive-xetex \
            lmodern latexmk pandoc
      - name: Build the NeurIPS report PDF into docs/report.pdf
        run: |
          # The published report.pdf IS the NeurIPS-2026 LaTeX paper (named/
          # preprint build) — the same artifact paper-pdf.yml produces — so the
          # site's "PDF" link is the formal paper, not a weasyprint HTML render.
          mkdir -p docs
          if [ -f FINDINGS.md ]; then
            cd paper
            sed \
              -e '1{/^# /d}' \
              -e 's|^## Abstract$|## Abstract {-}|' \
              -e 's|^## References$|## References {-}|' \
              -e 's|^## Limitations$|## Limitations {-}|' \
              ../FINDINGS.md > paper-pre.md
            pandoc paper-pre.md --from=markdown-smart --to=latex \
              --output=paper.tex.body --wrap=preserve \
              --no-highlight --shift-heading-level-by=-1
            latexmk -pdf -interaction=nonstopmode -e '$max_repeat=8' paper.tex
            if grep -E '^! LaTeX Error:' paper.log; then
              echo "::error::LaTeX Error(s) in paper.log — report PDF build failed."; exit 1
            fi
            cp paper.pdf ../docs/report.pdf
            cd ..
            echo "Built docs/report.pdf ($(du -h docs/report.pdf | cut -f1)) from the NeurIPS LaTeX source"
          else
            echo "No FINDINGS.md yet; skipping PDF build"
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
