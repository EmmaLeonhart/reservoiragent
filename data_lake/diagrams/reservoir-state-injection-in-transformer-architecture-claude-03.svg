<?xml version="1.0" encoding="UTF-8"?>
<svg width="100%" viewBox="0 0 690 820" role="img" style="max-width: 690px; display: block; margin-inline: auto;">
<title>Reservoir-augmented transformer agent architecture</title>
<desc>A transformer (Hermes base) with a dense randomly-initialized reservoir injected at mid-depth. Reservoir nodes attend to transformer tokens and to each other via the standard attention mechanism, producing implicit temporal state that feeds back into later layers.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
  </marker>
  <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
  </marker>
