<!-- ── Input tokens ── -->
<text class="ts" x="340" y="26" text-anchor="middle" style="fill:var(--color-text-secondary)">Input context (tools, observations, task)</text>
<g class="node c-gray" onclick="sendPrompt(&#39;What kind of input does the agent receive?&#39;)">
  <rect x="120" y="34" width="400" height="38" rx="6" stroke-width="0.5"></rect>
  <text class="th" x="320" y="53" text-anchor="middle" dominant-baseline="central">Tokenised input</text>
</g>
<line x1="320" y1="72" x2="320" y2="96" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)"></line>

<!-- ── Lower transformer block (frozen / lightly trained) ── -->
<g class="node c-purple" onclick="sendPrompt(&#39;Which layers of Hermes are frozen vs fine-tuned?&#39;)">
  <rect x="60" y="96" width="520" height="110" rx="10" stroke-width="0.5"></rect>
  <text class="th" x="320" y="120" text-anchor="middle" dominant-baseline="central">Hermes base — lower layers</text>
  <text class="ts" x="320" y="140" text-anchor="middle" dominant-baseline="central">Pre-trained agent model, mostly frozen</text>
  <rect x="90" y="152" width="120" height="32" rx="4" stroke-width="0" style="fill:#AFA9EC;opacity:0.5"></rect>
  <text class="ts" x="150" y="168" text-anchor="middle" dominant-baseline="central">Attention</text>
  <rect x="230" y="152" width="120" height="32" rx="4" stroke-width="0" style="fill:#AFA9EC;opacity:0.5"></rect>
  <text class="ts" x="290" y="168" text-anchor="middle" dominant-baseline="central">FFN</text>
  <rect x="370" y="152" width="120" height="32" rx="4" stroke-width="0" style="fill:#AFA9EC;opacity:0.5"></rect>
  <text class="ts" x="430" y="168" text-anchor="middle" dominant-baseline="central">Layer norm</text>
</g>

<line x1="320" y1="206" x2="320" y2="236" class="arr" marker-end="url(#arrow)" stroke="var(--color-text-tertiary)" mask="url(#imagine-text-gaps-ld2kry)"></line>

<!-- ── Reservoir injection zone ── -->
<text class="ts" x="340" y="228" text-anchor="middle" style="fill:var(--color-text-secondary)">↓  reservoir nodes injected here  ↓</text>

<!-- Reservoir container -->
<g class="node c-amber" onclick="sendPrompt(&#39;How is the reservoir initialized and what are its weights?&#39;)">
  <rect x="60" y="240" width="520" height="180" rx="10" stroke-width="0.8"></rect>
  <text class="th" x="320" y="264" text-anchor="middle" dominant-baseline="central">Reservoir (dense, randomly initialised, fixed)</text>
  <text class="ts" x="320" y="282" text-anchor="middle" dominant-baseline="central">Chaotic internal dynamics · recurrent self-connections</text>
</g>

<!-- Reservoir nodes -->
<g class="node c-amber" onclick="sendPrompt(&#39;What do individual reservoir neurons represent?&#39;)">
  <circle cx="148" cy="360" r="22" stroke-width="0.8"></circle>
  <text class="ts" x="148" y="360" text-anchor="middle" dominant-baseline="central">r₁</text>
</g>
<g class="node c-amber" onclick="sendPrompt(&#39;What do individual reservoir neurons represent?&#39;)">
  <circle cx="220" cy="330" r="22" stroke-width="0.8"></circle>
  <text class="ts" x="220" y="330" text-anchor="middle" dominant-baseline="central">r₂</text>
</g>
<g class="node c-amber" onclick="sendPrompt(&#39;What do individual reservoir neurons represent?&#39;)">
  <circle cx="300" cy="375" r="22" stroke-width="0.8"></circle>
  <text class="ts" x="300" y="375" text-anchor="middle" dominant-baseline="central">r₃</text>
</g>
<g class="node c-amber" onclick="sendPrompt(&#39;What do individual reservoir neurons represent?&#39;)">
  <circle cx="390" cy="330" r="22" stroke-width="0.8"></circle>
  <text class="ts" x="390" y="330" text-anchor="middle" dominant-baseline="central">r₄</text>
</g>
<g class="node c-amber" onclick="sendPrompt(&#39;What do individual reservoir neurons represent?&#39;)">
  <circle cx="470" cy="365" r="22" stroke-width="0.8"></circle>
  <text class="ts" x="470" y="365" text-anchor="middle" dominant-baseline="central">r₅</text>
</g>
<g class="node c-amber" onclick="sendPrompt(&#39;What do individual reservoir neurons represent?&#39;)">
  <circle cx="540" cy="338" r="22" stroke-width="0.8"></circle>
  <text class="ts" x="540" y="338" text-anchor="middle" dominant-baseline="central">r₆</text>
</g>

<!-- Reservoir internal connections (sparse wires) -->
<line x1="170" y1="358" x2="198" y2="340" stroke="#BA7517" stroke-width="0.8" opacity="0.5" fill="none"></line>
<line x1="242" y1="336" x2="278" y2="362" stroke="#BA7517" stroke-width="0.8" opacity="0.5" fill="none"></line>
